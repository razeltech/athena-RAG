<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Athena — Knowledge Assistant</title>
<style>
  :root {
    --bg: #12100e;
    --panel: #1b1815;
    --panel-2: #221e1a;
    --line: #322c26;
    --ink: #efe9e1;
    --ink-soft: #b8afa4;
    --muted: #8c8177;
    --accent: #d98b4e;      /* amber — the one bold note */
    --accent-soft: #6b4a2c;
    --user: #26201b;
    --radius: 14px;
    --mono: ui-monospace, "SFMono-Regular", Menlo, monospace;
    --sans: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  * { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background-color: var(--line); border-radius: 8px;
    border: 2px solid var(--panel); background-clip: padding-box;
  }
  *::-webkit-scrollbar-thumb:hover { background-color: var(--accent-soft); }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 15px; line-height: 1.6;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    display: grid; place-items: center; font-weight: 700; color: #12100e;
    font-family: var(--mono); font-size: 15px;
  }
  .brand { display: flex; flex-direction: column; gap: 1px; }
  .brand h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; line-height: 1.2; }
  .brand-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: .3px; }
  header .tag {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 2px 9px;
  }
  header .spacer { flex: 1; }
  .doc-btn {
    font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
    background: var(--panel-2); border: 1px solid var(--line);
    padding: 7px 13px; border-radius: 9px;
  }
  .doc-btn:hover { border-color: var(--accent-soft); }
  .icon-btn {
    width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px;
    color: var(--ink-soft); cursor: pointer; font-size: 15px; line-height: 1;
  }
  .icon-btn:hover { border-color: var(--accent-soft); color: var(--ink); }

  .layout { flex: 1; display: flex; min-height: 0; }
  .sidebar {
    flex: 0 0 240px; width: 240px; border-right: 1px solid var(--line); background: var(--panel);
    padding: 14px 12px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 10px;
    transition: flex-basis .18s ease, width .18s ease, padding .18s ease;
    white-space: nowrap;
  }
  .sidebar.collapsed {
    flex-basis: 0; width: 0; padding-left: 0; padding-right: 0; border-right: none;
  }
  .new-chat-btn {
    font: inherit; font-size: 13px; color: var(--ink); cursor: pointer;
    background: var(--panel-2); border: 1px solid var(--line);
    padding: 9px 12px; border-radius: 9px; text-align: left;
  }
  .new-chat-btn:hover { border-color: var(--accent-soft); }
  .conv-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .conv-row {
    display: flex; align-items: center; gap: 6px; padding: 8px 9px;
    border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--ink-soft);
  }
  .conv-row:hover { background: var(--panel-2); }
  .conv-row.active { background: var(--panel-2); color: var(--ink); }
  .conv-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-del {
    flex: 0 0 auto; background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 5px;
  }
  .conv-del:hover { color: var(--accent); background: var(--line); }

  .chat-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  main {
    flex: 1; overflow-y: auto; padding: 26px 0;
  }
  .thread { max-width: 760px; margin: 0 auto; padding: 0 20px; }

  .empty {
    text-align: center; color: var(--muted); margin-top: 12vh;
  }
  .empty .big {
    font-size: 22px; color: var(--ink); margin-bottom: 8px; font-weight: 600;
  }

  .msg { display: flex; gap: 14px; margin-bottom: 26px; }
  .avatar {
    flex: 0 0 28px; width: 28px; height: 28px; border-radius: 8px;
    display: grid; place-items: center; font-size: 12px; font-weight: 700;
    font-family: var(--mono);
  }
  .msg.user .avatar { background: var(--user); color: var(--ink-soft); border: 1px solid var(--line); }
  .msg.assistant .avatar { background: linear-gradient(135deg, var(--accent), var(--accent-soft)); color: #12100e; }
  .bubble { flex: 1; padding-top: 3px; }
  .bubble .who { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); }
  .bubble .text { white-space: pre-wrap; word-wrap: break-word; }
  .bubble .text sup { color: var(--accent); font-weight: 600; }
  .bubble .thinking, .bubble .timing {
    font-size: 11px; color: var(--muted); font-family: var(--mono);
  }
  .bubble .thinking { margin-bottom: 6px; }
  .msg-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .copy-btn {
    font: inherit; font-size: 11px; font-family: var(--mono); color: var(--muted);
    background: none; border: none; cursor: pointer; padding: 2px 6px;
    border-radius: 6px; visibility: hidden;
  }
  .msg:hover .copy-btn { visibility: visible; }
  .copy-btn:hover { color: var(--accent); background: var(--line); }
  .msg.user .copy-btn, .msg.user .msg-footer { display: none; }

  .sources {
    margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 12px;
  }
  .sources-toggle {
    display: inline-block; cursor: pointer; user-select: none;
    font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); font-weight: 600; font-family: var(--mono);
  }
  .sources-toggle:hover { color: var(--ink-soft); }
  .sources-toggle::before { content: "▸ "; }
  .sources-toggle.open::before { content: "▾ "; }
  .sources-body { display: none; margin-top: 10px; }
  .sources-body.open { display: block; }
  .source {
    display: flex; gap: 10px; font-size: 13px; margin-bottom: 8px;
    color: var(--ink-soft);
  }
  .source .n {
    flex: 0 0 auto; color: var(--accent); font-family: var(--mono);
    font-weight: 700;
  }
  .source .body { min-width: 0; }
  .source .src { color: var(--ink); }
  .source .snip { color: var(--muted); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  footer {
    border-top: 1px solid var(--line); background: var(--panel);
    padding: 16px 20px;
  }
  .composer {
    max-width: 760px; margin: 0 auto; display: flex; gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1; resize: none; font: inherit; color: var(--ink);
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; max-height: 160px; outline: none;
  }
  textarea:focus { border-color: var(--accent-soft); }
  .send {
    font: inherit; font-weight: 600; cursor: pointer; color: #12100e;
    background: var(--accent); border: none; border-radius: 12px;
    padding: 12px 18px;
  }
  .send:disabled { opacity: .45; cursor: default; }
  .mic-btn {
    width: 44px; height: 44px; flex: 0 0 auto; display: grid; place-items: center;
    font-size: 17px; border-radius: 12px; border: 1px dashed var(--line);
    background: var(--panel-2); color: var(--ink-soft); cursor: pointer; opacity: .6;
  }
  .mic-btn:hover { border-color: var(--accent-soft); color: var(--ink); opacity: .85; }
  .hint { max-width: 760px; margin: 8px auto 0; font-size: 11px; color: var(--muted); }
  input[type=file] { display: none; }
  .toast {
    position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--ink); padding: 9px 15px; border-radius: 10px; font-size: 13px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    align-items: center; justify-content: center; z-index: 10;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    width: 90%; max-width: 520px; max-height: 70vh; display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--line);
  }
  .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; line-height: 1; padding: 4px;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-body { padding: 10px 18px; overflow-y: auto; }
  .modal-empty { color: var(--muted); font-size: 13px; padding: 14px 0; }
  .doc-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .doc-row:last-child { border-bottom: none; }
  .doc-row .info { flex: 1; min-width: 0; }
  .doc-row .name { font-size: 13px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-row .meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .doc-row .del {
    background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 8px; padding: 5px 9px; cursor: pointer; font-size: 12px;
  }
  .doc-row .del:hover { border-color: var(--accent-soft); color: var(--accent); }
</style>
</head>
<body>
  <header>
    <button class="icon-btn" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle sidebar">&#9776;</button>
    <div class="mark">A</div>
    <div class="brand">
      <h1>Athena</h1>
      <div class="brand-sub">powered by Razel Tech</div>
    </div>
    <span class="tag">local · offline</span>
    <div class="spacer"></div>
    <button class="doc-btn" onclick="openDocsPanel()">My Documents</button>
    <button class="doc-btn" onclick="document.getElementById('file').click()">+ Add document</button>
    <input type="file" id="file" onchange="uploadDoc(this.files[0])" />
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button class="new-chat-btn" onclick="startNewChat()">+ New chat</button>
      <div class="conv-list" id="convList"></div>
    </aside>

    <div class="chat-col">
      <main id="main">
        <div class="thread" id="thread">
          <div class="empty" id="empty">
            <div class="big">Ask about your documents</div>
            <div>Add a document (txt, md, html, docx, xlsx, csv, pdf), then ask a question. Answers cite their sources.</div>
          </div>
        </div>
      </main>

      <footer>
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Ask a question about your documents..."
                    onkeydown="onKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="mic-btn" id="micBtn" onclick="onMicClick()" title="Voice input (coming soon)">&#127908;</button>
          <button class="send" id="send" onclick="send()">Send</button>
        </div>
        <div class="hint">Runs entirely on your hardware. Responses are grounded in retrieved passages. · Powered by Razel Tech</div>
      </footer>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="docsOverlay" onclick="if (event.target === this) closeDocsPanel()">
    <div class="modal">
      <div class="modal-header">
        <h3>My Documents</h3>
        <button class="modal-close" onclick="closeDocsPanel()">&times;</button>
      </div>
      <div class="modal-body" id="docsList"></div>
    </div>
  </div>

<script>
const API = ""; // same origin
let token = null;
let conversationId = null;

const EMPTY_STATE_HTML =
  '<div class="empty" id="empty">' +
  '<div class="big">Ask about your documents</div>' +
  '<div>Add a document (txt, md, html, docx, xlsx, csv, pdf), then ask a question. Answers cite their sources.</div>' +
  '</div>';

async function ensureLogin() {
  if (token) return;
  // DEV login — any credentials work. Replace with a real login screen later.
  const r = await fetch(API + "/v1/auth/login", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username: "dev", password: "dev"})
  });
  const data = await r.json();
  token = data.access_token;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

function autoGrow(el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; }
function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }

function esc(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function renderCites(text) { return esc(text).replace(/\[(\d+)\]/g, '<sup>[$1]</sup>'); }

function addMessage(role, text) {
  document.getElementById("empty")?.remove();
  const thread = document.getElementById("thread");
  const msg = document.createElement("div");
  msg.className = "msg " + role;
  msg.innerHTML =
    '<div class="avatar">' + (role === "user" ? "You" : "A") + '</div>' +
    '<div class="bubble"><div class="who">' + (role === "user" ? "You" : "Athena") +
    '</div><div class="thinking"></div><div class="text"></div>' +
    '<div class="msg-footer"><div class="timing"></div>' +
    '<button class="copy-btn" onclick="copyMessage(this)">Copy</button></div>' +
    '<div class="sources"></div></div>';
  thread.appendChild(msg);
  msg.querySelector(".text").innerHTML = renderCites(text);
  scrollDown();
  return msg;
}

function scrollDown() { const m = document.getElementById("main"); m.scrollTop = m.scrollHeight; }

async function uploadDoc(file) {
  if (!file) return;
  await ensureLogin();
  toast("Ingesting " + file.name + "...");
  const fd = new FormData(); fd.append("file", file);
  const r = await fetch(API + "/v1/documents", {
    method: "POST", headers: {"Authorization": "Bearer " + token}, body: fd
  });
  if (r.ok) { const d = await r.json(); toast("Added " + d.source + " (" + d.chunks + " chunks)"); }
  else { const e = await r.json(); toast("Error: " + (e.detail || r.status)); }
  document.getElementById("file").value = "";
}

async function send() {
  const input = document.getElementById("input");
  const question = input.value.trim();
  if (!question) return;
  await ensureLogin();

  input.value = ""; autoGrow(input);
  addMessage("user", question);
  const btn = document.getElementById("send"); btn.disabled = true;

  const msg = addMessage("assistant", "");
  const textEl = msg.querySelector(".text");
  const thinkingEl = msg.querySelector(".thinking");
  const timingEl = msg.querySelector(".timing");
  const srcEl = msg.querySelector(".sources");
  textEl.classList.add("cursor");
  let answer = "";

  const t0 = performance.now();
  let firstTokenAt = null;
  thinkingEl.textContent = "Thinking...";
  const thinkTimer = setInterval(() => {
    thinkingEl.textContent = "Thinking... " + ((performance.now() - t0) / 1000).toFixed(1) + "s";
  }, 100);

  try {
    const resp = await fetch(API + "/v1/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
      body: JSON.stringify({message: question, conversation_id: conversationId})
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const parts = buffer.split("\n\n"); buffer = parts.pop();
      for (const part of parts) {
        const ev = /event: (.*)/.exec(part);
        const dt = /data: (.*)/.exec(part);
        if (!ev || !dt) continue;
        const type = ev[1].trim();
        const data = JSON.parse(dt[1]);
        if (type === "conversation") {
          conversationId = data.conversation_id;
          loadConversations();
        }
        else if (type === "token") {
          if (firstTokenAt === null) {
            firstTokenAt = performance.now();
            clearInterval(thinkTimer);
            thinkingEl.textContent = "Thought for " + ((firstTokenAt - t0) / 1000).toFixed(1) + "s";
          }
          answer += data.text; textEl.innerHTML = renderCites(answer); scrollDown();
        }
        else if (type === "sources") { renderSources(srcEl, data.citations); }
        else if (type === "error") { answer += "\n\n[error: " + data.detail + "]"; textEl.innerHTML = renderCites(answer); }
      }
    }
  } catch (e) {
    textEl.innerHTML = renderCites("[connection error: " + e.message + "]");
  } finally {
    clearInterval(thinkTimer);
  }

  if (firstTokenAt === null) thinkingEl.textContent = "";
  const totalS = ((performance.now() - t0) / 1000).toFixed(1);
  timingEl.textContent = "Response time: " + totalS + "s";

  textEl.classList.remove("cursor");
  btn.disabled = false;
}

async function loadConversations() {
  const r = await fetch(API + "/v1/conversations", {
    headers: {"Authorization": "Bearer " + token}
  });
  renderSidebar(await r.json());
}

function renderSidebar(list) {
  const el = document.getElementById("convList");
  if (!list.length) {
    el.innerHTML = '<div class="modal-empty">No conversations yet.</div>';
    return;
  }
  let html = "";
  for (const c of list) {
    const active = c.id === conversationId ? " active" : "";
    html += '<div class="conv-row' + active + '" data-id="' + c.id + '" onclick="openConversation(\'' + c.id + '\')">' +
            '<span class="conv-title">' + esc(c.title || "New chat") + '</span>' +
            '<button class="conv-del" onclick="event.stopPropagation(); deleteConversationRow(\'' + c.id + '\')">&times;</button>' +
            '</div>';
  }
  el.innerHTML = html;
}

async function openConversation(id) {
  conversationId = id;
  document.getElementById("thread").innerHTML = EMPTY_STATE_HTML;
  const r = await fetch(API + "/v1/conversations/" + id + "/messages", {
    headers: {"Authorization": "Bearer " + token}
  });
  const messages = await r.json();
  for (const m of messages) {
    const el = addMessage(m.role, m.content);
    if (m.role === "assistant" && m.citations && m.citations.length) {
      renderSources(el.querySelector(".sources"), m.citations);
    }
  }
  highlightActiveConversation();
}

function startNewChat() {
  conversationId = null;
  document.getElementById("thread").innerHTML = EMPTY_STATE_HTML;
  highlightActiveConversation();
}

function highlightActiveConversation() {
  document.querySelectorAll(".conv-row").forEach(row => {
    row.classList.toggle("active", row.dataset.id === conversationId);
  });
}

async function deleteConversationRow(id) {
  await fetch(API + "/v1/conversations/" + id, {
    method: "DELETE", headers: {"Authorization": "Bearer " + token}
  });
  if (id === conversationId) startNewChat();
  await loadConversations();
}

async function openDocsPanel() {
  await ensureLogin();
  document.getElementById("docsOverlay").classList.add("show");
  await loadDocsList();
}

function closeDocsPanel() {
  document.getElementById("docsOverlay").classList.remove("show");
}

async function loadDocsList() {
  const r = await fetch(API + "/v1/documents", {
    headers: {"Authorization": "Bearer " + token}
  });
  renderDocsList(await r.json());
}

function renderDocsList(docs) {
  const el = document.getElementById("docsList");
  if (!docs.length) {
    el.innerHTML = '<div class="modal-empty">No documents uploaded yet.</div>';
    return;
  }
  let html = "";
  for (const d of docs) {
    const date = new Date(d.created_at).toLocaleString();
    html += '<div class="doc-row"><div class="info">' +
            '<div class="name">' + esc(d.source) + '</div>' +
            '<div class="meta">' + d.chunk_count + ' chunks · ' + esc(date) + '</div>' +
            '</div><button class="del" onclick="deleteDocument(\'' + d.id + '\')">Delete</button></div>';
  }
  el.innerHTML = html;
}

async function deleteDocument(id) {
  const r = await fetch(API + "/v1/documents/" + id, {
    method: "DELETE", headers: {"Authorization": "Bearer " + token}
  });
  if (r.ok) { toast("Document deleted"); await loadDocsList(); }
  else { const e = await r.json(); toast("Error: " + (e.detail || r.status)); }
}

let sidebarCollapsed = false;
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById("sidebar").classList.toggle("collapsed", sidebarCollapsed);
}

function onMicClick() {
  toast("Voice input isn't built yet — coming in a future update.");
}

async function copyMessage(btn) {
  const text = btn.closest(".bubble").querySelector(".text").innerText;
  try {
    await navigator.clipboard.writeText(text);
    toast("Copied");
  } catch (e) {
    toast("Copy failed: " + e.message);
  }
}

function toggleSources(toggleEl) {
  toggleEl.classList.toggle("open");
  toggleEl.nextElementSibling.classList.toggle("open");
}

function renderSources(el, citations) {
  if (!citations || !citations.length) return;
  let html = '<div class="sources-toggle" onclick="toggleSources(this)">Sources (' +
             citations.length + ')</div><div class="sources-body">';
  for (const c of citations) {
    html += '<div class="source"><span class="n">[' + c.n + ']</span>' +
            '<span class="body"><div class="src">' + esc(c.source) + '</div>' +
            '<div class="snip">' + esc(c.snippet) + '</div></span></div>';
  }
  el.innerHTML = html + "</div>";
}

(async () => {
  await ensureLogin();
  await loadConversations();
